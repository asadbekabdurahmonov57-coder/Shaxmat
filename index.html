<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Chess - Telegram</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a1a; margin: 0; font-family: sans-serif; color: white; overflow: hidden;
        }

        #status-container { margin-bottom: 10px; text-align: center; display: none; }
        #status { 
            font-size: 18px; font-weight: 900; background: #2c2c2c; padding: 10px 25px; 
            border-radius: 30px; border: 2px solid #444; color: #f1c40f; text-transform: uppercase;
        }
        
        #board { width: 95vw; max-width: 400px; margin: 10px; border: 5px solid #3e2723; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .white-1e1d1 { background-color: #dcbfa6 !important; }
        .black-3c85d { background-color: #7d4a3e !important; }

        .dot {
            height: 20px; width: 20px; background-color: rgba(255, 0, 0, 0.8);
            border-radius: 50%; display: block; margin: auto; pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .enemy-target {
            box-shadow: inset 0 0 15px 5px rgba(255, 0, 0, 0.9) !important;
            border: 2px solid red !important; box-sizing: border-box;
        }

        .king-check {
            background-color: #e74c3c !important;
            box-shadow: inset 0 0 20px 10px rgba(0, 0, 0, 0.3) !important;
        }
        
        .square-55d63 { display: flex; align-items: center; justify-content: center; position: relative; }

        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 80%; margin: 10px; text-transform: uppercase; }
        
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #online-list { width: 80%; max-height: 250px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid #444; }
        .user-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #444; align-items: center; width: 100%; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        #resign-btn { background: #e74c3c; color: white; padding: 12px 25px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: none; margin-top: 10px; }

        /* PROMOTION MODAL */
        #promotion-menu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; flex-direction: column; align-items: center; justify-content: center;
        }
        .promo-options { display: flex; gap: 15px; background: #2c2c2c; padding: 20px; border-radius: 15px; border: 2px solid #f1c40f; }
        .promo-piece { width: 60px; height: 60px; cursor: pointer; transition: transform 0.2s; }
        .promo-piece:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#f1c40f; font-weight: 900;">♟️ CHESS ONLINE</h1>
    <p id="my-name-display" style="font-weight: bold;">Yuklanmoqda...</p>
    <h3 style="margin-top: 20px;">🟢 ONLAYN O'YINCHILAR</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="exitApp()">Chiqish</button>
</div>

<div id="promotion-menu">
    <h2 style="color:#f1c40f; text-align: center;">TOSHNI TANLANG</h2>
    <div class="promo-options" id="promo-list">
        </div>
</div>

<div id="status-container">
    <div id="status">OQLAR NAVBATI</div>
</div>

<div id="board"></div>

<button id="resign-btn" onclick="resignGame()">🚩 Taslim bo'lish</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = {
        apiKey: "AIzaSyDvuBmuKfEPnd-ocDxzbzmfdCRLZUXnEO0",
        authDomain: "shaxmat-6862a.firebaseapp.com",
        projectId: "shaxmat-6862a",
        storageBucket: "shaxmat-6862a.firebasestorage.app",
        messagingSenderId: "54824096330",
        appId: "1:54824096330:web:5f90df28acd02c98394cb3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userId = tg.initDataUnsafe?.user?.id.toString() || "u" + Math.floor(Math.random()*10000);
    let currentName = tg.initDataUnsafe?.user?.first_name || "O'yinchi";
    let myRole = ''; 
    let gameId = '';
    let game = new Chess();
    let board = null;
    let selectedSquare = null;
    let pendingPromotion = null; // Almashish kutilayotgan yurish ma'lumoti

    document.getElementById('my-name-display').innerText = "👋 Salom, " + currentName;

    const myPres = db.ref('presence/' + userId);
    myPres.set({ name: currentName, online: true, inGame: false });
    myPres.onDisconnect().remove();

    db.ref('presence').on('value', (snap) => {
        const list = document.getElementById('online-list');
        list.innerHTML = '';
        snap.forEach(c => {
            if (c.key !== userId && c.val().online && !c.val().inGame) {
                list.innerHTML += `<div class="user-item">
                    <span>👤 ${c.val().name}</span> 
                    <button class="invite-btn" onclick="invite('${c.key}')">O'YIN</button>
                </div>`;
            }
        });
    });

    db.ref('invites/' + userId).on('value', (snap) => {
        const inv = snap.val();
        if (inv) {
            if (confirm(inv.fromName + " taklif yubordi. Qabul qilasizmi?")) {
                db.ref('invites/' + userId).remove();
                startGame(inv.gameId, 'black');
            }
        }
    });

    function invite(id) {
        const gid = userId + "_" + id;
        db.ref('invites/' + id).set({ fromId: userId, fromName: currentName, gameId: gid });
        startGame(gid, 'white');
    }

    function removeMarkers () {
        $('#board .square-55d63').find('.dot').remove();
        $('#board .square-55d63').removeClass('enemy-target');
    }

    function addMarker (square) {
        let $square = $('#board .square-' + square);
        let piece = game.get(square);
        if (piece) {
            $square.addClass('enemy-target');
        } else {
            $square.append('<div class="dot"></div>');
        }
    }

    function onSquareClick (square) {
        if (game.game_over()) return;
        const turn = game.turn();
        if ((turn === 'w' && myRole === 'black') || (turn === 'b' && myRole === 'white')) return;

        let $target = $('#board .square-' + square);
        if (selectedSquare && ($target.find('.dot').length > 0 || $target.hasClass('enemy-target'))) {
            checkPromotion(selectedSquare, square);
            return;
        }

        removeMarkers();
        let piece = game.get(square);
        if (piece && piece.color === turn) {
            selectedSquare = square;
            let moves = game.moves({ square: square, verbose: true });
            moves.forEach(m => addMarker(m.to));
        } else {
            selectedSquare = null;
        }
    }

    // Piyoda almashishini tekshirish
    function checkPromotion(from, to) {
        let piece = game.get(from);
        if (piece.type === 'p' && ((piece.color === 'w' && to[1] === '8') || (piece.color === 'b' && to[1] === '1'))) {
            pendingPromotion = { from: from, to: to };
            showPromotionMenu(piece.color);
        } else {
            makeMove(from, to, 'q');
        }
    }

    function showPromotionMenu(color) {
        const menu = document.getElementById('promotion-menu');
        const list = document.getElementById('promo-list');
        const pieces = [
            { type: 'q', name: 'Farzin' },
            { type: 'r', name: 'Ruh' },
            { type: 'b', name: 'Fil' },
            { type: 'n', name: 'Ot' }
        ];
        
        list.innerHTML = '';
        pieces.forEach(p => {
            const imgUrl = `https://chessboardjs.com/img/chesspieces/wikipedia/${color.toUpperCase()}${p.type.toUpperCase()}.png`;
            list.innerHTML += `<img src="${imgUrl}" class="promo-piece" onclick="selectPromotion('${p.type}')" alt="${p.name}">`;
        });
        menu.style.display = 'flex';
    }

    function selectPromotion(pieceType) {
        document.getElementById('promotion-menu').style.display = 'none';
        if (pendingPromotion) {
            makeMove(pendingPromotion.from, pendingPromotion.to, pieceType);
            pendingPromotion = null;
        }
    }

    function makeMove(from, to, promotionType) {
        const move = game.move({ from: from, to: to, promotion: promotionType || 'q' });
        if (move === null) return;

        removeMarkers();
        selectedSquare = null;
        board.position(game.fen());
        db.ref('games/' + gameId).update({ fen: game.fen() });
        updateStatus();
    }

    function startGame(id, role) {
        gameId = id;
        myRole = role;
        db.ref('presence/' + userId).update({ inGame: true });
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('status-container').style.display = 'block';
        document.getElementById('resign-btn').style.display = 'block';

        const config = {
            draggable: false, // Click-to-move rejimi uchun
            position: 'start',
            orientation: myRole,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);
        
        $('#board').on('mousedown touchstart', '.square-55d63', function(e) {
            let square = $(this).data('square');
            onSquareClick(square);
        });

        db.ref('games/' + gameId).on('value', (snap) => {
            const data = snap.val();
            if (data && data.fen !== game.fen()) {
                game.load(data.fen);
                board.position(data.fen);
                updateStatus();
            }
            if (data && data.event === 'resign') {
                alert("Raqib taslim bo'ldi!");
                location.reload();
            }
        });
        updateStatus();
    }

    function updateStatus() {
        let status = game.turn() === 'w' ? "OQLAR NAVBATI" : "QORALAR NAVBATI";
        $('#board .square-55d63').removeClass('king-check');

        if (game.in_check()) {
            status += "<br><span style='color: #e74c3c; font-size: 14px;'>SHOH XAVF OSTIDA!</span>";
            const turn = game.turn();
            const boardMatrix = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const p = boardMatrix[i][j];
                    if (p && p.type === 'k' && p.color === turn) {
                        const square = String.fromCharCode(97 + j) + (8 - i);
                        $('#board .square-' + square).addClass('king-check');
                    }
                }
            }
        }

        if (game.in_checkmate()) status = "O'YIN TUGADI (MOT)";
        else if (game.in_draw()) status = "DURANG";
        
        document.getElementById('status').innerHTML = status;
    }

    function resignGame() {
        if (confirm("Taslim bo'lasizmi?")) {
            db.ref('games/' + gameId).update({ event: 'resign' });
            location.reload();
        }
    }

    function exitApp() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.close();
        } else {
            window.location.href = "https://www.google.com";
        }
    }
</script>
</body>
</html>
